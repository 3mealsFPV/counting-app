<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Counter" />
  <title>Counting App</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);

      --blue: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;

      --shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.15);
    }

    * { 
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 0 16px;
      padding-top: max(16px, env(safe-area-inset-top));
    }

    .row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .stat {
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: var(--shadow-sm);
      padding: 16px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
    }

    .small {
      width: 140px;
      height: 140px;
    }

    .large {
      width: 170px;
      height: 170px;
    }

    .label {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9em;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 1.8em;
      font-weight: 700;
      line-height: 1;
    }

    .subvalue {
      margin-top: 4px;
      font-size: 0.85em;
      opacity: 0.9;
    }

    .blue { background: var(--blue); }
    .green { background: var(--green); }
    .red { background: var(--red); }

    .control {
      width: 64px;
      height: 64px;
      min-width: 64px;
      min-height: 64px;
      border-radius: 50%;
      border: none;
      font-size: 1.8rem;
      font-weight: bold;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      active: all 0.05s ease;
    }

    .control:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.2);
    }

    .control:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* RESET BUTTON */
    .reset-btn {
      margin-top: 8px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #facc15;
      color: #000;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s ease;
      min-height: 48px;
      touch-action: manipulation;
    }

    .reset-btn:active {
      transform: scale(0.95);
      background: #eab308;
    }

    .reset-btn:hover {
      background: #f0db4f;
    }

    /* MOBILE OPTIMIZATIONS */
    @media (max-width: 480px) {
      body {
        padding: max(12px, env(safe-area-inset-bottom));
      }

      .app {
        gap: 16px;
        padding: 0 12px;
      }

      .row {
        gap: 10px;
      }

      .stat {
        padding: 12px;
      }

      .small {
        width: 120px;
        height: 120px;
      }

      .large {
        width: 150px;
        height: 150px;
      }

      .label {
        font-size: 0.85em;
        margin-bottom: 4px;
      }

      .value {
        font-size: 1.6em;
      }

      .control {
        width: 56px;
        height: 56px;
        min-width: 56px;
        min-height: 56px;
        font-size: 1.5rem;
      }

      .reset-btn {
        width: 100%;
        padding: 12px 24px;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 320px) {
      .small {
        width: 100px;
        height: 100px;
      }

      .large {
        width: 130px;
        height: 130px;
      }

      .value {
        font-size: 1.4em;
      }

      .control {
        width: 48px;
        height: 48px;
        min-width: 48px;
        min-height: 48px;
        font-size: 1.2rem;
      }
    }

    /* ACCESSIBILITY */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
      }
    }

  </style>
</head>
<body>
  <div class="app">

    <!-- Goals -->
    <div class="row">
      <button class="control" id="goalsMinus" aria-label="Decrease goals">−</button>

      <div class="stat small green">
        <div class="label">Goals</div>
        <div class="value" id="goalsCount">0</div>
      </div>

      <button class="control" id="goalsPlus" aria-label="Increase goals">+</button>
    </div>

    <!-- Total -->
    <div class="stat large blue">
      <div class="label">Total Points</div>
      <div class="value" id="totalPoints">0.0</div>
    </div>

    <!-- Penalties -->
    <div class="row">
      <button class="control" id="penaltiesMinus" aria-label="Decrease penalties">−</button>

      <div class="stat small red">
        <div class="label">Penalties</div>
        <div class="value" id="penaltiesCount">0</div>
        <div class="subvalue" id="penaltiesValue">0.0</div>
      </div>

      <button class="control" id="penaltiesPlus" aria-label="Increase penalties">+</button>
    </div>

    <!-- RESET BUTTON -->
    <button class="reset-btn" id="resetBtn" aria-label="Reset all counts">Reset</button>

  </div>

  <script>
    let goalsCount = 0;
    let penaltiesCount = 0;

    // Cache DOM elements
    const elements = {
      goalsCount: document.getElementById("goalsCount"),
      penaltiesCount: document.getElementById("penaltiesCount"),
      penaltiesValue: document.getElementById("penaltiesValue"),
      totalPoints: document.getElementById("totalPoints"),
      goalsPlus: document.getElementById("goalsPlus"),
      goalsMinus: document.getElementById("goalsMinus"),
      penaltiesPlus: document.getElementById("penaltiesPlus"),
      penaltiesMinus: document.getElementById("penaltiesMinus"),
      resetBtn: document.getElementById("resetBtn")
    };

    function updateUI() {
      const penaltiesValue = penaltiesCount * 0.8;
      const totalPoints = goalsCount - penaltiesValue;

      elements.goalsCount.textContent = goalsCount;
      elements.penaltiesCount.textContent = penaltiesCount;
      elements.penaltiesValue.textContent = penaltiesValue.toFixed(1);
      elements.totalPoints.textContent = totalPoints.toFixed(1);
    }

    // Prevent negative counts
    const incrementGoals = () => { goalsCount++; updateUI(); };
    const decrementGoals = () => { if (goalsCount > 0) goalsCount--; updateUI(); };
    const incrementPenalties = () => { penaltiesCount++; updateUI(); };
    const decrementPenalties = () => { if (penaltiesCount > 0) penaltiesCount--; updateUI(); };

    elements.goalsPlus.onclick = incrementGoals;
    elements.goalsMinus.onclick = decrementGoals;
    elements.penaltiesPlus.onclick = incrementPenalties;
    elements.penaltiesMinus.onclick = decrementPenalties;

    elements.resetBtn.onclick = () => {
      goalsCount = 0;
      penaltiesCount = 0;
      updateUI();
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target === document.body || e.target === document.documentElement) {
        switch(e.key.toLowerCase()) {
          case 'g': incrementGoals(); break;
          case 'p': incrementPenalties(); break;
          case 'r': { goalsCount = 0; penaltiesCount = 0; updateUI(); } break;
        }
      }
    });

    updateUI();
  </script>
</body>
</html>
